<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سابق أعمالنا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toast-hidden { opacity: 0; transform: translate(-50%, -20px); pointer-events: none; }
        .toast-visible { opacity: 1; transform: translate(-50%, 20px); }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        /* تصميم قائمة الجودة */
        .quality-menu { display: none; }
        .quality-container:hover .quality-menu { display: block; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen relative flex flex-col items-center">

    <button type="button" onclick="showLoginPanel()" class="fixed top-4 right-4 sm:top-6 sm:right-6 z-40 text-gray-700 hover:text-white transition-colors p-2 rounded-lg hover:bg-gray-800" title="تسجيل الدخول كأدمن">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    </button>

    <div id="alert-toast" class="fixed top-0 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full shadow-2xl transition-all duration-300 font-bold text-sm toast-hidden text-center whitespace-nowrap">
        <span id="alert-msg"></span>
    </div>

    <div id="upload-bars-container" class="fixed bottom-4 left-4 z-50 flex flex-col gap-3 w-80 max-w-[calc(100vw-32px)] pointer-events-none"></div>

    <main class="w-full max-w-[1200px] px-4 py-12 flex flex-col items-center flex-grow mx-auto">
        <h1 id="page-title" class="text-2xl sm:text-3xl font-bold mb-12 text-center cursor-default select-none tracking-wide">مرحبا بكم هاذا سابق اعمالنا</h1>
        
        <div id="loading-spinner" class="animate-spin rounded-full h-12 w-12 border-b-2 border-white mt-10"></div>
        
        <div id="portfolio-grid" class="w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden"></div>
    </main>

    <div id="auth-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-[#111] border border-gray-800 p-8 rounded-3xl w-full max-w-sm flex flex-col items-center">
            <h2 class="text-xl font-bold mb-6 text-white">الوصول للإدارة</h2>
            <input id="admin-password" type="password" placeholder="أدخل الكود السري..." class="w-full bg-black border border-gray-700 rounded-xl p-4 text-center text-lg text-white mb-4 focus:outline-none focus:border-white transition" dir="ltr">
            <div class="flex gap-3 w-full">
                <button type="button" onclick="verifyAdmin()" class="flex-1 bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200 transition-colors">دخول</button>
                <button type="button" onclick="document.getElementById('auth-modal').classList.add('hidden')" class="px-6 bg-gray-800 text-white font-bold py-3 rounded-xl hover:bg-gray-700 transition-colors">إلغاء</button>
            </div>
            <p id="auth-error" class="text-red-500 text-sm mt-4 hidden font-bold">الكود غير صحيح</p>
        </div>
    </div>

    <div id="dashboard-panel" class="fixed inset-0 bg-[#0a0a0a] z-50 hidden flex flex-col h-screen overflow-hidden">
        <div class="bg-black border-b border-gray-800 p-4 sm:p-6 flex justify-between items-center shrink-0">
            <h2 class="text-xl sm:text-2xl font-bold text-white">إدارة البورتفوليو</h2>
            <button type="button" onclick="closeDashboard()" class="bg-gray-800 hover:bg-gray-700 text-white px-5 py-2.5 rounded-xl font-bold text-sm transition-colors shadow-lg">إغلاق وتحديث</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 sm:p-6 pb-24">
            <div class="max-w-3xl mx-auto space-y-8">
                <div class="bg-[#111] p-5 sm:p-6 rounded-2xl border border-gray-800">
                    <h3 class="text-lg font-bold mb-4">إضافة فيديو جديد</h3>
                    <div class="flex gap-2 mb-6 bg-black p-1.5 rounded-xl">
                        <button type="button" id="btn-url" class="flex-1 text-sm font-bold py-2.5 rounded-lg bg-gray-800 text-white transition-all shadow-sm" onclick="toggleUploadMode('url')">عبر رابط (مباشر فقط)</button>
                        <button type="button" id="btn-file" class="flex-1 text-sm font-bold py-2.5 rounded-lg text-gray-500 hover:text-white transition-all" onclick="toggleUploadMode('file')">رفع من الجهاز (موصى به)</button>
                    </div>
                    <div class="space-y-5">
                        <div id="mode-url">
                            <label class="block text-sm font-bold text-gray-400 mb-2">رابط الفيديو المباشر (روابط درايف ممنوعة)*</label>
                            <input id="input-vid-url" type="url" placeholder="https://..." class="w-full bg-black border border-gray-700 rounded-xl p-4 text-left text-white focus:outline-none focus:border-white transition" dir="ltr">
                        </div>
                        <div id="mode-file" class="hidden">
                            <label class="block text-sm font-bold text-gray-400 mb-2">اختر ملف فيديو*</label>
                            <input id="input-vid-file" type="file" accept="video/mp4,video/webm,video/ogg,video/quicktime" class="w-full bg-black border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-white transition file:mr-4 file:py-2.5 file:px-5 file:rounded-lg file:border-0 file:text-sm file:font-bold file:bg-gray-800 file:text-white hover:file:bg-gray-700 file:cursor-pointer">
                            <div class="mt-3 p-3 bg-blue-900/20 border border-blue-900/50 rounded-lg flex items-start gap-3">
                                <p class="text-[11px] text-blue-200/70 leading-relaxed">الرفع من هنا يحفظ الفيديو للأبد وبسرعة فائقة.</p>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-400 mb-2">عنوان الفيديو (اختياري)</label>
                            <input id="input-vid-title" type="text" placeholder="مثال: إعلان تجاري..." class="w-full bg-black border border-gray-700 rounded-xl p-4 text-white focus:outline-none focus:border-white transition">
                        </div>
                        <button type="button" onclick="submitVideo()" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-gray-200 transition-colors mt-4 text-lg">إضافة إلى البورتفوليو</button>
                    </div>
                </div>
                <div>
                    <h3 class="text-lg font-bold mb-4">الفيديوهات المرفوعة حالياً</h3>
                    <div id="dashboard-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myVideos = [];
        let myDeleted = [];
        let activeJobs = 0;
        let adminPass = 'ghost123@'; 
        let uploadMode = 'url';

        const CLOUD_ID = 'dhhnd1oq4'; 
        const UPLOAD_PRESET = 'portfolio_preset';

        async function bootApp() {
            try { myDeleted = JSON.parse(localStorage.getItem('v2_deleted')) || []; } catch(e) {}

            const cacheData = localStorage.getItem('v2_videos');
            if (cacheData) {
                try { myVideos = JSON.parse(cacheData); } catch(e) { myVideos = []; }
                buildGrid();
                buildDashboard();
            }
            
            try {
                const res = await fetch(`https://res.cloudinary.com/${CLOUD_ID}/video/list/portfolio_video.json?cb=${Date.now()}`);
                if (res.ok) {
                    const payload = await res.json();
                    if (payload && payload.resources) {
                        let cloudItems = payload.resources.map(r => {
                            const rawUrl = `https://res.cloudinary.com/${CLOUD_ID}/video/upload/v${r.version}/${r.public_id}.${r.format}`;
                            const vidTitle = (r.context && r.context.custom && r.context.custom.title) ? r.context.custom.title : '';
                            return { id: r.public_id, url: rawUrl, title: vidTitle, ts: new Date(r.created_at).getTime() };
                        });

                        cloudItems = cloudItems.filter(cv => !myDeleted.includes(cv.id));

                        let newMerged = [...cloudItems];
                        myVideos.forEach(lv => {
                            let inCloud = cloudItems.some(cv => lv.url.includes(cv.id));
                            if (!inCloud && !myDeleted.includes(lv.id)) {
                                newMerged.push(lv);
                            }
                        });

                        // دمج أوقات التوقف والجودة المختارة
                        newMerged.forEach(mv => {
                            const match = myVideos.find(v => v.id === mv.id);
                            if(match) {
                                mv.stoppedAt = match.stoppedAt || 0.5;
                                mv.quality = match.quality || 480;
                            } else {
                                mv.stoppedAt = 0.5;
                                mv.quality = 480;
                            }
                        });

                        myVideos = newMerged;
                        myVideos.sort((a, b) => b.ts - a.ts);
                        localStorage.setItem('v2_videos', JSON.stringify(myVideos));
                    }
                }
            } catch (e) {
                console.log("Sync Mode Active");
            } finally {
                document.getElementById('loading-spinner').classList.add('hidden');
                document.getElementById('portfolio-grid').classList.remove('hidden');
                buildGrid();
                buildDashboard();
            }
        }

        function displayAlert(msg, type = 'success') {
            const tst = document.getElementById('alert-toast');
            const txt = document.getElementById('alert-msg');
            txt.textContent = msg;
            tst.className = `fixed top-0 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full shadow-2xl transition-all duration-300 font-bold text-sm text-center whitespace-nowrap toast-visible ${type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            setTimeout(() => { tst.classList.remove('toast-visible'); tst.classList.add('toast-hidden'); }, 3000);
        }

        function generateQualityUrl(base, q) {
            if (base.includes('cloudinary.com/video/upload/')) {
                return base.replace('/upload/', `/upload/q_auto:eco,f_auto,h_${q}/`);
            }
            return base;
        }

        function buildGrid() {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = '';
            if(myVideos.length === 0) {
                grid.innerHTML = '<p class="text-center text-gray-500 text-sm mt-10 lg:col-span-3">سيتم إضافة الأعمال قريباً.</p>';
                return;
            }
            myVideos.forEach(v => {
                const wrap = document.createElement('div');
                wrap.className = "flex flex-col gap-3";
                const tHtml = v.title ? `<h3 class="text-gray-300 text-center font-bold text-md px-2 truncate">${v.title}</h3>` : '';
                
                const qUrl = generateQualityUrl(v.url, v.quality || 480);
                const startPoint = v.stoppedAt || 0.5;
                const freezeFrame = `${qUrl}#t=${startPoint}`;

                wrap.innerHTML = `
                    <div class="relative w-full aspect-[9/16] bg-black rounded-2xl overflow-hidden shadow-[0_0_30px_rgba(0,0,0,0.6)] group" id="box-${v.id}">
                        <video src="${freezeFrame}" class="absolute inset-0 w-full h-full object-cover blur-xl opacity-40 scale-110 pointer-events-none transition-opacity duration-500 group-hover:opacity-60" preload="metadata" muted playsinline></video>
                        <video src="${freezeFrame}" class="absolute inset-0 w-full h-full object-contain cursor-pointer z-10 transition-transform duration-500 group-hover:scale-[1.02]" preload="metadata" muted playsinline onclick="launchPlayer('${v.id}')"></video>
                        <div class="absolute inset-0 flex items-center justify-center cursor-pointer z-20" onclick="launchPlayer('${v.id}')">
                            <div class="w-14 h-14 bg-black/60 backdrop-blur-md rounded-full flex items-center justify-center border border-white/20 shadow-2xl transition-transform duration-300 group-hover:scale-110 group-hover:bg-white/10">
                                <svg class="w-6 h-6 text-white ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                    </div>
                    ${tHtml}
                `;
                grid.appendChild(wrap);
            });
        }

        window.launchPlayer = function(id) {
            // إيقاف وتدمير أي فيديو يعمل
            document.querySelectorAll('.is-playing').forEach(box => {
                if (box.id !== `box-${id}`) {
                    box.querySelectorAll('video').forEach(vid => {
                        vid.pause(); vid.removeAttribute('src'); vid.load(); 
                    });
                    box.innerHTML = box.getAttribute('original-state');
                    box.classList.remove('is-playing');
                }
            });

            const box = document.getElementById(`box-${id}`);
            if (box) {
                if (!box.hasAttribute('original-state')) {
                    box.setAttribute('original-state', box.innerHTML);
                }
                
                box.classList.add('is-playing');
                const targetObj = myVideos.find(x => x.id === id);
                const q = targetObj.quality || 480;
                const point = targetObj.stoppedAt || 0.5;
                const finalLink = generateQualityUrl(targetObj.url, q);
                
                box.innerHTML = `
                    <video src="${finalLink}#t=${point}" class="absolute inset-0 w-full h-full object-cover blur-xl opacity-40 scale-110 pointer-events-none" preload="none" muted playsinline></video>
                    <video id="vid-${id}" class="absolute inset-0 w-full h-full object-contain z-10 bg-black/50" src="${finalLink}" controls autoplay playsinline controlsList="nodownload"></video>
                    
                    <div class="absolute top-3 right-3 z-50 quality-container cursor-pointer">
                        <div class="bg-black/70 backdrop-blur-sm text-white px-3 py-1.5 rounded-lg text-xs font-bold border border-white/20 flex items-center gap-1 hover:bg-black transition-colors shadow-lg">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            ${q}p
                        </div>
                        <div class="quality-menu absolute top-full right-0 mt-2 bg-black/95 border border-white/20 rounded-lg overflow-hidden w-32 shadow-2xl">
                            <div onclick="switchQ('${id}', 1080)" class="w-full text-right px-4 py-2.5 text-xs font-bold ${q === 1080 ? 'text-blue-400 bg-white/10' : 'text-gray-200 hover:bg-white/10'} border-b border-white/10">1080p (أصلي)</div>
                            <div onclick="switchQ('${id}', 720)" class="w-full text-right px-4 py-2.5 text-xs font-bold ${q === 720 ? 'text-blue-400 bg-white/10' : 'text-gray-200 hover:bg-white/10'} border-b border-white/10">720p (عالي)</div>
                            <div onclick="switchQ('${id}', 480)" class="w-full text-right px-4 py-2.5 text-xs font-bold ${q === 480 ? 'text-blue-400 bg-white/10' : 'text-gray-200 hover:bg-white/10'}">480p (سريع)</div>
                        </div>
                    </div>
                `;
                
                const plyr = box.querySelector(`#vid-${id}`);
                
                plyr.addEventListener('loadedmetadata', () => { plyr.currentTime = point; });

                plyr.addEventListener('timeupdate', () => {
                    if (targetObj && !plyr.paused) {
                        targetObj.stoppedAt = plyr.currentTime;
                    }
                });
                
                plyr.addEventListener('pause', () => {
                    if (targetObj) {
                        targetObj.stoppedAt = plyr.currentTime;
                        localStorage.setItem('v2_videos', JSON.stringify(myVideos));
                    }
                });

                plyr.addEventListener('play', () => {
                    document.querySelectorAll('.is-playing').forEach(c => {
                        if(c !== box) {
                            c.querySelectorAll('video').forEach(v => { v.pause(); v.removeAttribute('src'); v.load(); });
                            c.innerHTML = c.getAttribute('original-state');
                            c.classList.remove('is-playing');
                        }
                    });
                });
            }
        }

        window.switchQ = function(id, newQ) {
            const tObj = myVideos.find(v => v.id === id);
            if(tObj) {
                tObj.quality = newQ;
                const p = document.getElementById(`vid-${id}`);
                if(p) { tObj.stoppedAt = p.currentTime; p.pause(); }
                localStorage.setItem('v2_videos', JSON.stringify(myVideos));
                launchPlayer(id);
            }
        }

        function showLoginPanel() {
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('admin-password').focus();
        }

        function verifyAdmin() {
            const inp = document.getElementById('admin-password').value;
            const err = document.getElementById('auth-error');
            if(inp === adminPass) {
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('dashboard-panel').classList.remove('hidden');
                document.getElementById('admin-password').value = '';
                err.classList.add('hidden');
            } else {
                err.classList.remove('hidden');
            }
        }

        function closeDashboard() {
            document.getElementById('dashboard-panel').classList.add('hidden');
            bootApp();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleUploadMode(mode) {
            uploadMode = mode;
            const isUrl = (mode === 'url');
            document.getElementById('btn-url').className = isUrl ? "flex-1 text-sm font-bold py-2.5 rounded-lg bg-gray-800 text-white transition-all shadow-sm" : "flex-1 text-sm font-bold py-2.5 rounded-lg text-gray-500 hover:text-white transition-all";
            document.getElementById('btn-file').className = !isUrl ? "flex-1 text-sm font-bold py-2.5 rounded-lg bg-gray-800 text-white transition-all shadow-sm" : "flex-1 text-sm font-bold py-2.5 rounded-lg text-gray-500 hover:text-white transition-all";
            
            if(isUrl) {
                document.getElementById('mode-url').classList.remove('hidden');
                document.getElementById('mode-file').classList.add('hidden');
            } else {
                document.getElementById('mode-file').classList.remove('hidden');
                document.getElementById('mode-url').classList.add('hidden');
            }
        }

        function submitVideo() {
            try {
                const ttl = document.getElementById('input-vid-title').value.trim();
                
                if (uploadMode === 'url') {
                    let uInp = document.getElementById('input-vid-url').value.trim();
                    if (!uInp) { displayAlert('يرجى إدخال رابط الفيديو', 'error'); return; }
                    if (uInp.includes('drive.google.com')) { displayAlert('❌ درايف ممنوع! استخدم الرفع.', 'error'); return; }

                    saveVidRecord(uInp, ttl);
                    document.getElementById('input-vid-url').value = '';
                    document.getElementById('input-vid-title').value = '';
                    displayAlert('تم الإضافة بنجاح', 'success');
                } else {
                    const fInp = document.getElementById('input-vid-file');
                    if (!fInp.files || fInp.files.length === 0) { displayAlert('اختر ملف', 'error'); return; }
                    if (activeJobs >= 3) { displayAlert('الحد الأقصى 3', 'error'); return; }
                    
                    const f = fInp.files[0];
                    if (f.size > 200 * 1024 * 1024) { displayAlert('أكبر من 200MB', 'error'); return; }
                    
                    fInp.value = '';
                    document.getElementById('input-vid-title').value = '';
                    pushToCloud(f, ttl);
                }
            } catch(e) { displayAlert('خطأ', 'error'); }
        }

        function pushToCloud(file, title) {
            activeJobs++;
            const cont = document.getElementById('upload-bars-container');
            const uid = 'up-' + Date.now();
            
            const c = document.createElement('div');
            c.id = uid;
            c.className = "bg-gray-900 border border-gray-800 p-4 rounded-2xl shadow-2xl flex flex-col gap-2 text-white animate-slide-up text-right pointer-events-auto";
            c.innerHTML = `
                <div class="flex justify-between items-center gap-4">
                    <span class="text-xs text-gray-400 font-mono truncate max-w-[140px]" dir="ltr">${file.name}</span>
                    <span class="text-xs font-bold text-blue-400">يرفع... <span id="p-${uid}">0%</span></span>
                </div>
                <div class="w-full bg-gray-800 h-1.5 rounded-full overflow-hidden">
                    <div id="b-${uid}" class="bg-blue-500 h-full w-0 transition-all duration-150"></div>
                </div>
            `;
            cont.appendChild(c);

            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', UPLOAD_PRESET);
            fd.append('tags', 'portfolio_video'); 
            if(title) fd.append('context', `title=${title}`);

            const req = new XMLHttpRequest();
            req.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_ID}/video/upload`);

            req.upload.onprogress = e => {
                if (e.lengthComputable) {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    const pel = document.getElementById(`p-${uid}`);
                    const bel = document.getElementById(`b-${uid}`);
                    if(pel) pel.textContent = pct + '%';
                    if(bel) bel.style.width = pct + '%';
                }
            };

            req.onload = () => {
                activeJobs--;
                if (req.status === 200) {
                    const json = JSON.parse(req.responseText);
                    saveVidRecord(json.secure_url, title);
                    c.className = "bg-green-950/90 border border-green-800 p-4 rounded-2xl flex flex-col gap-1 text-white text-right";
                    c.innerHTML = `<p class="text-xs text-green-400 font-bold">✓ تم</p>`;
                    setTimeout(() => c.remove(), 3000);
                } else {
                    c.className = "bg-red-950/90 border border-red-800 p-4 rounded-2xl flex flex-col gap-1 text-white text-right";
                    c.innerHTML = `<p class="text-xs text-red-400 font-bold">✕ فشل</p>`;
                    setTimeout(() => c.remove(), 5000);
                }
            };

            req.onerror = () => {
                activeJobs--;
                c.innerHTML = `<p class="text-xs text-red-400 font-bold">✕ انقطع النت</p>`;
                setTimeout(() => c.remove(), 4000);
            };

            req.send(fd);
        }

        function saveVidRecord(u, t) {
            myVideos.unshift({ id: 'v-' + Date.now(), url: u, title: t, ts: Date.now(), stoppedAt: 0.5, quality: 480 });
            localStorage.setItem('v2_videos', JSON.stringify(myVideos));
            buildGrid();
            buildDashboard();
        }

        function buildDashboard() {
            const lst = document.getElementById('dashboard-list');
            if(!lst) return;
            lst.innerHTML = '';
            if(myVideos.length === 0) {
                lst.innerHTML = '<p class="text-center text-gray-500 py-4">فارغ</p>';
                return;
            }
            myVideos.forEach(v => {
                const li = document.createElement('div');
                li.className = "flex items-center gap-4 bg-[#111] p-3 rounded-xl border border-gray-800";
                let dUrl = v.url.length > 40 ? v.url.substring(0,40) + '...' : v.url;
                
                const thumb = generateQualityUrl(v.url, 480) + '#t=0.5';

                li.innerHTML = `
                    <div class="w-14 h-20 bg-gray-900 rounded-lg flex shrink-0 overflow-hidden relative">
                        <video src="${thumb}" class="absolute inset-0 w-full h-full object-cover opacity-70" preload="metadata" muted playsinline></video>
                    </div>
                    <div class="flex-grow overflow-hidden">
                        <p class="text-sm font-bold truncate text-gray-200">${v.title || 'بدون'}</p>
                        <p class="text-xs text-gray-500 truncate mt-1" dir="ltr">${dUrl}</p>
                    </div>
                    <button type="button" onclick="dropVid('${v.id}')" class="bg-red-500/10 text-red-500 px-4 py-2 text-sm rounded-lg font-bold hover:bg-red-500 hover:text-white">حذف</button>
                `;
                lst.appendChild(li);
            });
        }

        window.dropVid = function(id) {
            if(!confirm('حذف؟')) return;
            myVideos = myVideos.filter(v => v.id !== id);
            myDeleted.push(id);
            localStorage.setItem('v2_deleted', JSON.stringify(myDeleted));
            localStorage.setItem('v2_videos', JSON.stringify(myVideos));
            buildGrid();
            buildDashboard();
            displayAlert('تم الحذف', 'success');
        }

        let clkCt = 0; let clkTmr = null;
        document.getElementById('page-title').addEventListener('click', () => {
            clkCt++;
            if (clkCt === 3) { showLoginPanel(); clkCt = 0; }
            clearTimeout(clkTmr);
            clkTmr = setTimeout(() => { clkCt = 0; }, 1000);
        });

        document.getElementById('admin-password').addEventListener('keypress', e => {
            if (e.key === 'Enter') verifyAdmin();
        });

        bootApp();
    </script>
</body>
</html>
