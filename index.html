<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سابق أعمالنا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toast-hidden { opacity: 0; transform: translate(-50%, -20px); pointer-events: none; }
        .toast-visible { opacity: 1; transform: translate(-50%, 20px); }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen relative flex flex-col items-center">

    <!-- زر تسجيل الدخول للإدارة -->
    <button type="button" onclick="showLogin()" class="fixed top-4 right-4 sm:top-6 sm:right-6 z-40 text-gray-700 hover:text-white transition-colors p-2 rounded-lg hover:bg-gray-800" title="تسجيل الدخول كأدمن">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    </button>

    <!-- إشعارات التنبيه -->
    <div id="toast" class="fixed top-0 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full shadow-2xl transition-all duration-300 font-bold text-sm toast-hidden text-center whitespace-nowrap">
        <span id="toast-message"></span>
    </div>

    <!-- حاوية أشرطة الرفع العائمة أسفل الشاشة -->
    <div id="upload-progress-container" class="fixed bottom-4 left-4 z-50 flex flex-col gap-3 w-80 max-w-[calc(100vw-32px)] pointer-events-none"></div>

    <!-- المحتوى الرئيسي للموقع -->
    <main class="w-full max-w-[500px] px-4 py-12 flex flex-col items-center flex-grow">
        <h1 id="main-title" class="text-2xl sm:text-3xl font-bold mb-10 text-center cursor-default select-none">مرحبا بكم هاذا سابق اعمالنا</h1>
        <div id="loading" class="animate-spin rounded-full h-12 w-12 border-b-2 border-white mt-10"></div>
        <div id="video-feed" class="w-full flex flex-col gap-10 hidden"></div>
    </main>

    <!-- نافذة تسجيل الدخول -->
    <div id="login-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-[#111] border border-gray-800 p-8 rounded-3xl w-full max-w-sm flex flex-col items-center">
            <h2 class="text-xl font-bold mb-6 text-white">الوصول للإدارة</h2>
            <input id="secret-code" type="password" placeholder="أدخل الكود السري..." class="w-full bg-black border border-gray-700 rounded-xl p-4 text-center text-lg text-white mb-4 focus:outline-none focus:border-white transition" dir="ltr">
            <div class="flex gap-3 w-full">
                <button type="button" onclick="checkCode()" class="flex-1 bg-white text-black font-bold py-3 rounded-xl hover:bg-gray-200 transition-colors">دخول</button>
                <button type="button" onclick="document.getElementById('login-modal').classList.add('hidden')" class="px-6 bg-gray-800 text-white font-bold py-3 rounded-xl hover:bg-gray-700 transition-colors">إلغاء</button>
            </div>
            <p id="login-error" class="text-red-500 text-sm mt-4 hidden font-bold">الكود غير صحيح</p>
        </div>
    </div>

    <!-- لوحة التحكم للإدارة -->
    <div id="admin-panel" class="fixed inset-0 bg-[#0a0a0a] z-50 hidden flex flex-col h-screen overflow-hidden">
        <div class="bg-black border-b border-gray-800 p-4 sm:p-6 flex justify-between items-center shrink-0">
            <h2 class="text-xl sm:text-2xl font-bold text-white">إدارة البورتفوليو</h2>
            <button type="button" onclick="closeAdmin()" class="bg-gray-800 hover:bg-gray-700 text-white px-5 py-2.5 rounded-xl font-bold text-sm transition-colors">إغلاق وتحديث</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 sm:p-6 pb-24">
            <div class="max-w-3xl mx-auto space-y-8">
                <div class="bg-[#111] p-5 sm:p-6 rounded-2xl border border-gray-800">
                    <h3 class="text-lg font-bold mb-4">إضافة فيديو جديد</h3>
                    <div class="flex gap-2 mb-6 bg-black p-1.5 rounded-xl">
                        <button type="button" id="tab-url" class="flex-1 text-sm font-bold py-2.5 rounded-lg bg-gray-800 text-white transition-all shadow-sm" onclick="switchTab('url')">عبر رابط</button>
                        <button type="button" id="tab-file" class="flex-1 text-sm font-bold py-2.5 rounded-lg text-gray-500 hover:text-white transition-all" onclick="switchTab('file')">رفع من الجهاز</button>
                    </div>
                    <div class="space-y-5">
                        <div id="input-url-container">
                            <label class="block text-sm font-bold text-gray-400 mb-2">رابط الفيديو المباشر*</label>
                            <input id="new-video-url" type="url" placeholder="https://..." class="w-full bg-black border border-gray-700 rounded-xl p-4 text-left text-white focus:outline-none focus:border-white transition" dir="ltr">
                        </div>
                        <div id="input-file-container" class="hidden">
                            <label class="block text-sm font-bold text-gray-400 mb-2">اختر ملف فيديو*</label>
                            <input id="new-video-file" type="file" accept="video/mp4,video/webm,video/ogg,video/quicktime" class="w-full bg-black border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-white transition file:mr-4 file:py-2.5 file:px-5 file:rounded-lg file:border-0 file:text-sm file:font-bold file:bg-gray-800 file:text-white hover:file:bg-gray-700 file:cursor-pointer">
                            <div class="mt-3 p-3 bg-blue-900/20 border border-blue-900/50 rounded-lg flex items-start gap-3">
                                <p class="text-[11px] text-blue-200/70 leading-relaxed">يمكنك رفع حتى 3 فيديوهات في آن واحد بحجم أقصى 200 ميجابايت للملف.</p>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-400 mb-2">عنوان الفيديو (اختياري)</label>
                            <input id="new-video-title" type="text" placeholder="مثال: إعلان تجاري..." class="w-full bg-black border border-gray-700 rounded-xl p-4 text-white focus:outline-none focus:border-white transition">
                        </div>
                        <button type="button" onclick="addVideo()" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-gray-200 transition-colors mt-4 text-lg shadow-lg shadow-white/10">إضافة إلى البورتفوليو</button>
                    </div>
                </div>
                <div>
                    <h3 class="text-lg font-bold mb-4">الفيديوهات المرفوعة حالياً</h3>
                    <div id="admin-video-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- تم استخدام سكريبت عادي بدون Module لضمان التوافق التام مع جميع الأجهزة -->
    <script>
        let videos = [];
        let activeUploadsCount = 0;
        let currentSecretCode = 'ghost123@'; 
        let currentUploadMethod = 'url'; // تعريف دقيق لطريقة الرفع

        const CLOUDINARY_CLOUD_NAME = 'dschdzijk'; 
        const CLOUDINARY_UPLOAD_PRESET = 'portfolio_preset';

        async function init() {
            const localVideos = localStorage.getItem('portfolio_videos');
            if (localVideos) {
                try { videos = JSON.parse(localVideos); } catch(e) { videos = []; }
                renderVideos();
                renderAdminVideos();
            }
            
            try {
                const response = await fetch(`https://res.cloudinary.com/${CLOUDINARY_CLOUD_NAME}/video/list/portfolio_video.json?cb=${Date.now()}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.resources) {
                        videos = data.resources.map(r => {
                            const videoUrl = `https://res.cloudinary.com/${CLOUDINARY_CLOUD_NAME}/video/upload/v${r.version}/${r.public_id}.${r.format}`;
                            const title = (r.context && r.context.custom && r.context.custom.title) ? r.context.custom.title : '';
                            return { id: r.public_id, videoUrl: videoUrl, title: title, timestamp: new Date(r.created_at).getTime() };
                        });
                        videos.sort((a, b) => b.timestamp - a.timestamp);
                        localStorage.setItem('portfolio_videos', JSON.stringify(videos));
                    }
                }
            } catch (e) {
                console.log("Cloudinary Sync Not Ready");
            }

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('video-feed').classList.remove('hidden');
            renderVideos();
            renderAdminVideos();
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            toastMsg.textContent = msg;
            toast.className = `fixed top-0 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full shadow-2xl transition-all duration-300 font-bold text-sm text-center whitespace-nowrap toast-visible ${type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            setTimeout(() => {
                toast.classList.remove('toast-visible');
                toast.classList.add('toast-hidden');
            }, 3000);
        }

        function renderVideos() {
            const feed = document.getElementById('video-feed');
            feed.innerHTML = '';
            if(videos.length === 0) {
                feed.innerHTML = '<p class="text-center text-gray-500 text-sm mt-10">سيتم إضافة الأعمال قريباً.</p>';
                return;
            }
            videos.forEach(v => {
                const el = document.createElement('div');
                el.className = "flex flex-col gap-4";
                const titleHtml = v.title ? `<h3 class="text-gray-200 text-center font-bold text-lg px-2">${v.title}</h3>` : '';
                let posterUrl = v.videoUrl;
                let optimizedVideoUrl = v.videoUrl;
                if (v.videoUrl.includes('cloudinary.com/video/upload/')) {
                    posterUrl = v.videoUrl.replace('/upload/', '/upload/w_400,q_auto:low,f_jpg/').replace(/\.[^/.]+$/, ".jpg");
                    optimizedVideoUrl = v.videoUrl.replace('/upload/', '/upload/q_auto,f_auto,h_854/');
                }
                el.innerHTML = `
                    <div class="relative w-full aspect-[9/16] bg-gray-900 rounded-2xl overflow-hidden shadow-[0_0_40px_rgba(0,0,0,0.5)] group" id="container-${v.id}">
                        <img src="${posterUrl}" class="absolute inset-0 w-full h-full object-cover cursor-pointer" onclick="playVideo('${v.id}', '${optimizedVideoUrl}')" onerror="this.src='https://placehold.co/400x700/111111/555555?text=فيديو'"/>
                        <div class="absolute inset-0 flex items-center justify-center cursor-pointer" onclick="playVideo('${v.id}', '${optimizedVideoUrl}')">
                            <div class="w-16 h-16 bg-black/60 backdrop-blur-sm rounded-full flex items-center justify-center border border-white/20 shadow-2xl transition-transform group-hover:scale-110">
                                <svg class="w-7 h-7 text-white ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                    </div>
                    ${titleHtml}
                `;
                feed.appendChild(el);
            });
        }

        function playVideo(id, videoUrl) {
            const container = document.getElementById(`container-${id}`);
            if(container) container.innerHTML = `<video id="video-${id}" class="w-full h-full object-cover" src="${videoUrl}" controls autoplay playsinline></video>`;
        }

        function showLogin() {
            document.getElementById('login-modal').classList.remove('hidden');
            document.getElementById('secret-code').focus();
        }

        function checkCode() {
            const input = document.getElementById('secret-code').value;
            const error = document.getElementById('login-error');
            if(input === currentSecretCode) {
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('secret-code').value = '';
                error.classList.add('hidden');
            } else {
                error.classList.remove('hidden');
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.add('hidden');
            init();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchTab(tab) {
            currentUploadMethod = tab;
            const isUrl = (tab === 'url');
            document.getElementById('tab-url').className = isUrl ? "flex-1 text-sm font-bold py-2.5 rounded-lg bg-gray-800 text-white transition-all shadow-sm" : "flex-1 text-sm font-bold py-2.5 rounded-lg text-gray-500 hover:text-white transition-all";
            document.getElementById('tab-file').className = !isUrl ? "flex-1 text-sm font-bold py-2.5 rounded-lg bg-gray-800 text-white transition-all shadow-sm" : "flex-1 text-sm font-bold py-2.5 rounded-lg text-gray-500 hover:text-white transition-all";
            
            if(isUrl) {
                document.getElementById('input-url-container').classList.remove('hidden');
                document.getElementById('input-file-container').classList.add('hidden');
            } else {
                document.getElementById('input-file-container').classList.remove('hidden');
                document.getElementById('input-url-container').classList.add('hidden');
            }
        }

        function addVideo() {
            try {
                const title = document.getElementById('new-video-title').value.trim();
                
                if (currentUploadMethod === 'url') {
                    const videoUrlInput = document.getElementById('new-video-url');
                    if (!videoUrlInput.value.trim()) {
                        showToast('يرجى إدخال رابط الفيديو', 'error');
                        return;
                    }
                    processVideoSave(videoUrlInput.value.trim(), title);
                    videoUrlInput.value = '';
                    document.getElementById('new-video-title').value = '';
                    showToast('تمت إضافة رابط الفيديو بنجاح', 'success');
                } else {
                    const fileInput = document.getElementById('new-video-file');
                    if (!fileInput.files || fileInput.files.length === 0) {
                        showToast('يرجى اختيار ملف فيديو للرفع', 'error');
                        return;
                    }
                    if (activeUploadsCount >= 3) {
                        showToast('تنبيه: جاري رفع 3 فيديوهات حالياً، انتظر انتهاء أحدها!', 'error');
                        return;
                    }
                    const file = fileInput.files[0];
                    if (file.size > 200 * 1024 * 1024) {
                        showToast('الفيديو كبير جداً! الحد الأقصى 200 ميجابايت.', 'error');
                        return;
                    }
                    
                    // تفريغ الخانات فوراً لتسمح برفع فيديو آخر
                    fileInput.value = '';
                    document.getElementById('new-video-title').value = '';
                    triggerParallelUpload(file, title);
                }
            } catch(e) {
                showToast('حدث خطأ أثناء تنفيذ الأمر', 'error');
            }
        }

        function triggerParallelUpload(file, title) {
            activeUploadsCount++;
            const progressContainer = document.getElementById('upload-progress-container');
            const uploadId = 'upload-' + Date.now() + Math.floor(Math.random() * 1000);
            
            const card = document.createElement('div');
            card.id = uploadId;
            card.className = "bg-gray-900 border border-gray-800 p-4 rounded-2xl shadow-2xl flex flex-col gap-2 text-white animate-slide-up text-right pointer-events-auto";
            card.innerHTML = `
                <div class="flex justify-between items-center gap-4">
                    <span class="text-xs text-gray-400 font-mono truncate max-w-[140px]" dir="ltr">${file.name}</span>
                    <span class="text-xs font-bold text-blue-400">جاري الرفع... <span id="pct-${uploadId}">0%</span></span>
                </div>
                <div class="w-full bg-gray-800 h-1.5 rounded-full overflow-hidden">
                    <div id="bar-${uploadId}" class="bg-blue-500 h-full w-0 transition-all duration-150"></div>
                </div>
            `;
            progressContainer.appendChild(card);

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            formData.append('tags', 'portfolio_video'); 
            if(title) formData.append('context', `title=${title}`);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/upload`);

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    const percentComplete = Math.round((e.loaded / e.total) * 100);
                    const pctEl = document.getElementById(`pct-${uploadId}`);
                    const barEl = document.getElementById(`bar-${uploadId}`);
                    if(pctEl) pctEl.textContent = percentComplete + '%';
                    if(barEl) barEl.style.width = percentComplete + '%';
                }
            };

            xhr.onload = function() {
                activeUploadsCount--;
                if (xhr.status === 200) {
                    const response = JSON.parse(xhr.responseText);
                    processVideoSave(response.secure_url, title);
                    card.className = "bg-green-950/90 border border-green-800 p-4 rounded-2xl shadow-2xl flex flex-col gap-1 text-white text-right";
                    card.innerHTML = `<p class="text-xs text-green-400 font-bold">✓ تم الرفع بنجاح: <span class="text-gray-300 font-mono" dir="ltr">${file.name}</span></p>`;
                    setTimeout(() => { card.remove(); }, 3500);
                } else {
                    card.className = "bg-red-950/90 border border-red-800 p-4 rounded-2xl shadow-2xl flex flex-col gap-1 text-white text-right";
                    card.innerHTML = `<p class="text-xs text-red-400 font-bold">✕ فشل الرفع السحابي: <span dir="ltr">${file.name}</span></p>`;
                    setTimeout(() => { card.remove(); }, 4000);
                }
            };

            xhr.onerror = function() {
                activeUploadsCount--;
                card.className = "bg-red-950/90 border border-red-800 p-4 rounded-2xl shadow-2xl flex flex-col gap-1 text-white text-right";
                card.innerHTML = `<p class="text-xs text-red-400 font-bold">✕ انقطع الاتصال بالإنترنت أثناء الرفع</p>`;
                setTimeout(() => { card.remove(); }, 4000);
            };

            xhr.send(formData);
        }

        function processVideoSave(videoUrl, title) {
            videos.unshift({ id: 'local-' + Date.now(), videoUrl, title, timestamp: Date.now() });
            localStorage.setItem('portfolio_videos', JSON.stringify(videos));
            renderVideos();
            renderAdminVideos();
        }

        function renderAdminVideos() {
            const list = document.getElementById('admin-video-list');
            if(!list) return;
            list.innerHTML = '';
            if(videos.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-500 py-4">لا توجد فيديوهات حالياً</p>';
                return;
            }
            videos.forEach(v => {
                const item = document.createElement('div');
                item.className = "flex items-center gap-4 bg-[#111] p-3 rounded-xl border border-gray-800";
                let displayUrl = v.videoUrl.length > 40 ? v.videoUrl.substring(0,40) + '...' : v.videoUrl;
                item.innerHTML = `
                    <div class="w-14 h-20 bg-gray-900 rounded-lg flex items-center justify-center flex-shrink-0">
                        <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </div>
                    <div class="flex-grow overflow-hidden">
                        <p class="text-sm font-bold truncate text-gray-200">${v.title || 'بدون عنوان'}</p>
                        <p class="text-xs text-gray-500 truncate mt-1" dir="ltr">${displayUrl}</p>
                    </div>
                    <button type="button" onclick="deleteVideo('${v.id}')" class="bg-red-500/10 text-red-500 px-4 py-2 text-sm rounded-lg font-bold hover:bg-red-500 hover:text-white transition-colors">حذف</button>
                `;
                list.appendChild(item);
            });
        }

        function deleteVideo(id) {
            if(!confirm('هل أنت متأكد من حذف هذا الفيديو؟ \nملاحظة: لحذف الفيديو بشكل نهائي من السحابة، يجب مسحه من لوحة Cloudinary.')) return;
            videos = videos.filter(v => v.id !== id);
            localStorage.setItem('portfolio_videos', JSON.stringify(videos));
            renderVideos();
            renderAdminVideos();
            showToast('تم الحذف من الواجهة بنجاح', 'success');
        }

        // تسجيل الدخول بالضغط 3 مرات
        let clickCount = 0;
        let clickTimer = null;
        document.getElementById('main-title').addEventListener('click', () => {
            clickCount++;
            if (clickCount === 3) { showLogin(); clickCount = 0; }
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
        });

        document.getElementById('secret-code').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkCode();
        });

        init();
    </script>
</body>
</html>
