<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سابق أعمالنا</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* Utility Classes */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .w-full { width: 100%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .gap-4 { gap: 1rem; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mb-12 { margin-bottom: 3rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-3 { margin-top: 0.75rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-10 { margin-top: 2.5rem; }
        .p-2 { padding: 0.5rem; }
        .p-3 { padding: 0.75rem; }
        .p-4 { padding: 1rem; }
        .p-5 { padding: 1.25rem; }
        .p-8 { padding: 2rem; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
        .py-12 { padding-top: 3rem; padding-bottom: 3rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .font-bold { font-weight: 700; }
        .rounded-lg { border-radius: 0.5rem; }
        .rounded-xl { border-radius: 0.75rem; }
        .rounded-2xl { border-radius: 1rem; }
        .rounded-3xl { border-radius: 1.5rem; }
        .rounded-full { border-radius: 9999px; }
        
        /* Buttons & Inputs */
        button { cursor: pointer; border: none; font-family: inherit; }
        input { font-family: inherit; outline: none; }
        .btn-white { background: #fff; color: #000; }
        .btn-gray { background: #1f2937; color: #fff; }
        .btn-red { background: rgba(239,68,68,0.1); color: #ef4444; }
        .btn-red:hover { background: #ef4444; color: #fff; }
        input[type="text"], input[type="url"], input[type="password"], input[type="file"] {
            background: #000; border: 1px solid #374151; color: #fff; border-radius: 0.75rem; padding: 1rem; width: 100%;
        }
        input:focus { border-color: #fff; }
        
        /* Layouts */
        main { width: 100%; max-width: 1200px; padding: 1rem; flex-grow: 1; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        
        /* Video Box */
        .vid-box { position: relative; width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 1rem; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.6); }
        .vid-thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .play-btn-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
        .play-btn-bg { width: 56px; height: 56px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); }
        .play-btn-overlay:hover .play-btn-bg { background: rgba(255,255,255,0.1); transform: scale(1.1); }
        .play-icon { width: 24px; height: 24px; fill: #fff; margin-left: 4px; }
        .vid-title { color: #d1d5db; text-align: center; font-weight: 700; padding: 0 0.5rem; margin-top: 0.75rem; }
        
        /* Modals & Floating Elements */
        .fixed { position: fixed; }
        .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
        .z-40 { z-index: 40; }
        .z-50 { z-index: 50; }
        .z-100 { z-index: 100; }
        .admin-icon { top: 1rem; right: 1rem; color: #4b5563; padding: 0.5rem; border-radius: 0.5rem; transition: 0.3s; background: transparent; }
        .admin-icon:hover { color: #fff; background: #1f2937; }
        .toast { top: 0; left: 50%; transform: translateX(-50%); padding: 0.75rem 1.5rem; border-radius: 9999px; font-weight: 700; font-size: 0.875rem; box-shadow: 0 10px 15px rgba(0,0,0,0.3); transition: all 0.3s; }
        .toast-hidden { opacity: 0; transform: translate(-50%, -20px); pointer-events: none; }
        .toast-visible { opacity: 1; transform: translate(-50%, 20px); }
        .upload-cont { bottom: 1rem; left: 1rem; display: flex; flex-direction: column; gap: 0.75rem; width: 320px; max-width: calc(100vw - 32px); pointer-events: none; }
        .upload-box { background: #111; border: 1px solid #1f2937; padding: 1rem; border-radius: 1rem; box-shadow: 0 10px 15px rgba(0,0,0,0.3); pointer-events: auto; }
        
        /* Spinner */
        .spinner { width: 48px; height: 48px; border: 2px solid #333; border-bottom-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 2.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Animation */
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body>

    <button type="button" onclick="showLoginPanel()" class="fixed z-40 admin-icon" title="تسجيل الدخول كأدمن">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    </button>

    <div id="alert-toast" class="fixed z-100 toast toast-hidden text-center">
        <span id="alert-msg"></span>
    </div>

    <div id="upload-bars-container" class="fixed z-50 upload-cont"></div>

    <main class="mx-auto py-12 flex flex-col items-center">
        <h1 id="page-title" class="font-bold mb-12 text-center cursor-default select-none" style="font-size: 1.8rem;">مرحبا بكم هاذا سابق اعمالنا</h1>
        <div id="loading-spinner" class="spinner"></div>
        <div id="portfolio-grid" class="w-full grid hidden"></div>
    </main>

    <div id="auth-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4" style="background: rgba(0,0,0,0.9);">
        <div class="p-8 rounded-3xl w-full max-w-sm flex flex-col items-center" style="background: #111; border: 1px solid #1f2937;">
            <h2 class="text-xl font-bold mb-6 text-white">الوصول للإدارة</h2>
            <input id="admin-password" type="password" placeholder="أدخل الكود السري..." class="mb-4" style="text-align: center;" dir="ltr">
            <div class="flex gap-3 w-full">
                <button type="button" onclick="verifyAdmin()" class="btn-white flex-1 font-bold py-3 rounded-xl">دخول</button>
                <button type="button" onclick="document.getElementById('auth-modal').classList.add('hidden')" class="btn-gray px-6 font-bold py-3 rounded-xl">إلغاء</button>
            </div>
            <p id="auth-error" class="text-red-500 text-sm mt-4 hidden font-bold">الكود غير صحيح</p>
        </div>
    </div>

    <div id="dashboard-panel" class="fixed inset-0 z-50 hidden flex flex-col" style="background: #0a0a0a; height: 100vh; overflow: hidden;">
        <div class="p-4 flex justify-between items-center" style="background: #000; border-bottom: 1px solid #1f2937;">
            <h2 class="text-xl font-bold text-white">إدارة البورتفوليو</h2>
            <button type="button" onclick="closeDashboard()" class="btn-gray font-bold text-sm rounded-xl py-2.5 px-5">إغلاق وتحديث</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4" style="padding-bottom: 6rem;">
            <div class="max-w-3xl mx-auto flex flex-col gap-8">
                <div class="p-5 rounded-2xl" style="background: #111; border: 1px solid #1f2937;">
                    <h3 class="text-lg font-bold mb-4">إضافة فيديو جديد</h3>
                    <div class="flex gap-2 mb-6 p-1.5 rounded-xl" style="background: #000;">
                        <button type="button" id="btn-url" class="flex-1 text-sm font-bold py-2.5 rounded-lg" style="background: #1f2937; color: #fff;" onclick="toggleUploadMode('url')">عبر رابط (مباشر فقط)</button>
                        <button type="button" id="btn-file" class="flex-1 text-sm font-bold py-2.5 rounded-lg" style="color: #6b7280;" onclick="toggleUploadMode('file')">رفع من الجهاز (موصى به)</button>
                    </div>
                    <div class="flex flex-col gap-5">
                        <div id="mode-url">
                            <label class="block text-sm font-bold mb-2" style="color: #9ca3af;">رابط الفيديو المباشر (روابط درايف ممنوعة)*</label>
                            <input id="input-vid-url" type="url" placeholder="https://..." dir="ltr" style="text-align: left;">
                        </div>
                        <div id="mode-file" class="hidden">
                            <label class="block text-sm font-bold mb-2" style="color: #9ca3af;">اختر ملف فيديو*</label>
                            <input id="input-vid-file" type="file" accept="video/mp4,video/webm,video/ogg,video/quicktime">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2" style="color: #9ca3af;">عنوان الفيديو (اختياري)</label>
                            <input id="input-vid-title" type="text" placeholder="مثال: إعلان تجاري...">
                        </div>
                        <button type="button" onclick="submitVideo()" class="btn-white w-full font-bold py-4 rounded-xl mt-4 text-lg">إضافة إلى البورتفوليو</button>
                    </div>
                </div>
                <div>
                    <h3 class="text-lg font-bold mb-4">الفيديوهات المرفوعة حالياً</h3>
                    <div id="dashboard-list" class="flex flex-col gap-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myVideos = [];
        let myDeleted = [];
        let activeJobs = 0;
        let adminPass = 'ghost123@'; 
        let uploadMode = 'url';

        const CLOUD_ID = 'dhhnd1oq4'; 
        const UPLOAD_PRESET = 'portfolio_preset';

        async function bootApp() {
            try { myDeleted = JSON.parse(localStorage.getItem('v3_deleted')) || []; } catch(e) {}

            const cacheData = localStorage.getItem('v3_videos');
            if (cacheData) {
                try { myVideos = JSON.parse(cacheData); } catch(e) { myVideos = []; }
                buildGrid();
                buildDashboard();
            }
            
            try {
                const res = await fetch(`https://res.cloudinary.com/${CLOUD_ID}/video/list/portfolio_video.json?cb=${Date.now()}`);
                if (res.ok) {
                    const payload = await res.json();
                    if (payload && payload.resources) {
                        let cloudItems = payload.resources.map(r => {
                            const rawUrl = `https://res.cloudinary.com/${CLOUD_ID}/video/upload/v${r.version}/${r.public_id}.${r.format}`;
                            const vidTitle = (r.context && r.context.custom && r.context.custom.title) ? r.context.custom.title : '';
                            return { id: r.public_id, url: rawUrl, title: vidTitle, ts: new Date(r.created_at).getTime() };
                        });

                        cloudItems = cloudItems.filter(cv => !myDeleted.includes(cv.id));

                        let newMerged = [...cloudItems];
                        myVideos.forEach(lv => {
                            let inCloud = cloudItems.some(cv => lv.url.includes(cv.id));
                            if (!inCloud && !myDeleted.includes(lv.id)) {
                                newMerged.push(lv);
                            }
                        });

                        newMerged.forEach(mv => {
                            const match = myVideos.find(v => v.id === mv.id);
                            if(match) {
                                mv.stoppedAt = match.stoppedAt || 0.5;
                                mv.quality = match.quality || 480;
                            } else {
                                mv.stoppedAt = 0.5;
                                mv.quality = 480; 
                            }
                        });

                        myVideos = newMerged;
                        myVideos.sort((a, b) => b.ts - a.ts);
                        localStorage.setItem('v3_videos', JSON.stringify(myVideos));
                    }
                }
            } catch (e) {
                console.log("Sync Mode Active");
            } finally {
                document.getElementById('loading-spinner').classList.add('hidden');
                document.getElementById('portfolio-grid').classList.remove('hidden');
                buildGrid();
                buildDashboard();
            }
        }

        function displayAlert(msg, type = 'success') {
            const tst = document.getElementById('alert-toast');
            const txt = document.getElementById('alert-msg');
            txt.textContent = msg;
            tst.className = `fixed z-100 toast toast-visible text-center ${type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            setTimeout(() => { tst.classList.remove('toast-visible'); tst.classList.add('toast-hidden'); }, 3000);
        }

        // توليد رابط صورة مصغرة مع تحديد اللحظة الزمنية (so_) لضمان ظهورها
        function generateImageUrl(base, point = 0.5) {
            if (base.includes('cloudinary.com/video/upload/')) {
                let p = point.toFixed(1); // تحويل الرقم لنص (مثال: 0.5)
                return base.replace('/upload/', `/upload/f_jpg,w_400,q_auto,so_${p}/`);
            }
            return base;
        }

        // توليد رابط فيديو بجودة مخفضة
        function generateQualityUrl(base, qLabel) {
            if (base.includes('cloudinary.com/video/upload/')) {
                let w = 360; let qParams = 'low'; 
                if (qLabel === 720) { w = 640; qParams = 'eco'; }
                if (qLabel === 1080) { w = 720; qParams = 'good'; }
                return base.replace('/upload/', `/upload/w_${w},q_auto:${qParams},f_mp4/`);
            }
            return base;
        }

        function buildGrid() {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = '';
            if(myVideos.length === 0) {
                grid.innerHTML = '<p class="text-center mt-10" style="color: #6b7280;">سيتم إضافة الأعمال قريباً.</p>';
                return;
            }
            myVideos.forEach(v => {
                const wrap = document.createElement('div');
                wrap.className = "flex flex-col gap-3";
                const tHtml = v.title ? `<h3 class="vid-title truncate">${v.title}</h3>` : '';
                
                const point = v.stoppedAt || 0.5;
                const thumbUrl = generateImageUrl(v.url, point);
                
                wrap.innerHTML = `
                    <div class="vid-box" id="box-${v.id}">
                        <img src="${thumbUrl}" class="vid-thumb" loading="lazy" alt="thumbnail" onerror="this.style.display='none'">
                        <div class="play-btn-overlay" onclick="launchPlayer('${v.id}')">
                            <div class="play-btn-bg">
                                <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                    </div>
                    ${tHtml}
                `;
                grid.appendChild(wrap);
            });
        }

        window.launchPlayer = function(id) {
            document.querySelectorAll('.is-playing').forEach(box => {
                if (box.id !== `box-${id}`) {
                    box.classList.remove('is-playing');
                    box.innerHTML = box.getAttribute('original-state');
                }
            });

            const box = document.getElementById(`box-${id}`);
            if (box) {
                if (!box.hasAttribute('original-state')) {
                    box.setAttribute('original-state', box.innerHTML);
                }
                
                box.classList.add('is-playing');
                const targetObj = myVideos.find(x => x.id === id);
                const q = targetObj.quality || 480;
                const point = targetObj.stoppedAt || 0.5;
                const finalLink = generateQualityUrl(targetObj.url, q);
                const videoSrc = `${finalLink}#t=${point}`; // إجبار المتصفح على البدء من الثانية المحفوظة
                
                box.innerHTML = `
                    <video id="vid-${id}" class="absolute inset-0 w-full h-full object-contain z-10" style="background: rgba(0,0,0,0.5); width:100%; height:100%;" src="${videoSrc}" controls autoplay playsinline controlsList="nodownload"></video>
                    
                    <div class="fixed z-50" style="top: 0.75rem; right: 0.75rem; display: flex; flex-direction: column; align-items: flex-end;">
                        <button type="button" onclick="toggleQualityMenu('${id}')" class="font-bold text-xs rounded-lg flex items-center gap-1" style="background: rgba(0,0,0,0.8); color: #fff; padding: 0.375rem 0.75rem; border: 1px solid rgba(255,255,255,0.2);">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            ${q}p
                        </button>
                        <div id="qmenu-${id}" class="hidden mt-2 rounded-lg overflow-hidden w-32" style="background: rgba(0,0,0,0.95); border: 1px solid rgba(255,255,255,0.2);">
                            <button type="button" onclick="switchQ('${id}', 1080)" class="w-full text-right px-4 py-3 text-xs font-bold ${q === 1080 ? 'text-blue-400' : 'text-gray-200'}" style="border-bottom: 1px solid rgba(255,255,255,0.1);">1080p (أصلي)</button>
                            <button type="button" onclick="switchQ('${id}', 720)" class="w-full text-right px-4 py-3 text-xs font-bold ${q === 720 ? 'text-blue-400' : 'text-gray-200'}" style="border-bottom: 1px solid rgba(255,255,255,0.1);">720p (عالي)</button>
                            <button type="button" onclick="switchQ('${id}', 480)" class="w-full text-right px-4 py-3 text-xs font-bold ${q === 480 ? 'text-blue-400' : 'text-gray-200'}">480p (سريع)</button>
                        </div>
                    </div>
                `;
                
                const plyr = box.querySelector(`#vid-${id}`);
                
                // إجبار الفيديو على التحرك للثانية المحفوظة بمجرد تحميل البيانات
                plyr.addEventListener('loadedmetadata', () => {
                    try { plyr.currentTime = point; } catch(e) {}
                });

                plyr.addEventListener('timeupdate', () => {
                    if (targetObj && !plyr.paused) {
                        targetObj.stoppedAt = plyr.currentTime;
                    }
                });
                
                plyr.addEventListener('pause', () => {
                    if (targetObj) {
                        targetObj.stoppedAt = plyr.currentTime;
                        localStorage.setItem('v3_videos', JSON.stringify(myVideos));
                    }
                });

                plyr.addEventListener('play', () => {
                    document.querySelectorAll('.is-playing').forEach(c => {
                        if(c !== box) {
                            c.innerHTML = c.getAttribute('original-state');
                            c.classList.remove('is-playing');
                        }
                    });
                });
            }
        }

        window.toggleQualityMenu = function(id) {
            const menu = document.getElementById(`qmenu-${id}`);
            if(menu) menu.classList.toggle('hidden');
        }

        window.switchQ = function(id, newQ) {
            const tObj = myVideos.find(v => v.id === id);
            if(tObj) {
                tObj.quality = newQ;
                const p = document.getElementById(`vid-${id}`);
                if(p) { 
                    tObj.stoppedAt = p.currentTime; 
                    p.pause();
                    p.removeAttribute('src');
                    p.load();
                }
                localStorage.setItem('v3_videos', JSON.stringify(myVideos));
                launchPlayer(id); 
            }
        }

        function showLoginPanel() {
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('admin-password').focus();
        }

        function verifyAdmin() {
            const inp = document.getElementById('admin-password').value;
            const err = document.getElementById('auth-error');
            if(inp === adminPass) {
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('dashboard-panel').classList.remove('hidden');
                document.getElementById('admin-password').value = '';
                err.classList.add('hidden');
            } else {
                err.classList.remove('hidden');
            }
        }

        function closeDashboard() {
            document.getElementById('dashboard-panel').classList.add('hidden');
            bootApp();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleUploadMode(mode) {
            uploadMode = mode;
            const isUrl = (mode === 'url');
            document.getElementById('btn-url').style.cssText = isUrl ? "background: #1f2937; color: #fff;" : "background: transparent; color: #6b7280;";
            document.getElementById('btn-file').style.cssText = !isUrl ? "background: #1f2937; color: #fff;" : "background: transparent; color: #6b7280;";
            
            if(isUrl) {
                document.getElementById('mode-url').classList.remove('hidden');
                document.getElementById('mode-file').classList.add('hidden');
            } else {
                document.getElementById('mode-file').classList.remove('hidden');
                document.getElementById('mode-url').classList.add('hidden');
            }
        }

        function submitVideo() {
            try {
                const ttl = document.getElementById('input-vid-title').value.trim();
                
                if (uploadMode === 'url') {
                    let uInp = document.getElementById('input-vid-url').value.trim();
                    if (!uInp) { displayAlert('يرجى إدخال رابط الفيديو', 'error'); return; }
                    if (uInp.includes('drive.google.com')) { displayAlert('❌ درايف ممنوع! استخدم الرفع.', 'error'); return; }

                    saveVidRecord(uInp, ttl);
                    document.getElementById('input-vid-url').value = '';
                    document.getElementById('input-vid-title').value = '';
                    displayAlert('تم الإضافة بنجاح', 'success');
                } else {
                    const fInp = document.getElementById('input-vid-file');
                    if (!fInp.files || fInp.files.length === 0) { displayAlert('اختر ملف', 'error'); return; }
                    if (activeJobs >= 3) { displayAlert('الحد الأقصى 3', 'error'); return; }
                    
                    const f = fInp.files[0];
                    if (f.size > 200 * 1024 * 1024) { displayAlert('أكبر من 200MB', 'error'); return; }
                    
                    fInp.value = '';
                    document.getElementById('input-vid-title').value = '';
                    pushToCloud(f, ttl);
                }
            } catch(e) { displayAlert('خطأ', 'error'); }
        }

        function pushToCloud(file, title) {
            activeJobs++;
            const cont = document.getElementById('upload-bars-container');
            const uid = 'up-' + Date.now();
            
            const c = document.createElement('div');
            c.id = uid;
            c.className = "upload-box animate-slide-up text-right";
            c.innerHTML = `
                <div class="flex justify-between items-center gap-4">
                    <span class="text-xs truncate" style="color: #9ca3af; max-width: 140px;" dir="ltr">${file.name}</span>
                    <span class="text-xs font-bold" style="color: #60a5fa;">يرفع... <span id="p-${uid}">0%</span></span>
                </div>
                <div class="w-full h-1.5 rounded-full overflow-hidden mt-2" style="background: #1f2937;">
                    <div id="b-${uid}" class="h-full w-0" style="background: #3b82f6; transition: width 0.15s;"></div>
                </div>
            `;
            cont.appendChild(c);

            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', UPLOAD_PRESET);
            fd.append('tags', 'portfolio_video'); 
            if(title) fd.append('context', `title=${title}`);

            const req = new XMLHttpRequest();
            req.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_ID}/video/upload`);

            req.upload.onprogress = e => {
                if (e.lengthComputable) {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    const pel = document.getElementById(`p-${uid}`);
                    const bel = document.getElementById(`b-${uid}`);
                    if(pel) pel.textContent = pct + '%';
                    if(bel) bel.style.width = pct + '%';
                }
            };

            req.onload = () => {
                activeJobs--;
                if (req.status === 200) {
                    const json = JSON.parse(req.responseText);
                    saveVidRecord(json.secure_url, title);
                    c.style.cssText = "background: rgba(6,78,59,0.9); border: 1px solid #065f46; padding: 1rem; border-radius: 1rem; text-align: right;";
                    c.innerHTML = `<p class="text-xs font-bold" style="color: #4ade80;">✓ تم</p>`;
                    setTimeout(() => c.remove(), 3000);
                } else {
                    c.style.cssText = "background: rgba(127,29,29,0.9); border: 1px solid #7f1d1d; padding: 1rem; border-radius: 1rem; text-align: right;";
                    c.innerHTML = `<p class="text-xs font-bold" style="color: #f87171;">✕ فشل</p>`;
                    setTimeout(() => c.remove(), 5000);
                }
            };

            req.onerror = () => {
                activeJobs--;
                c.innerHTML = `<p class="text-xs font-bold" style="color: #f87171;">✕ انقطع النت</p>`;
                setTimeout(() => c.remove(), 4000);
            };

            req.send(fd);
        }

        function saveVidRecord(u, t) {
            myVideos.unshift({ id: 'v-' + Date.now(), url: u, title: t, ts: Date.now(), stoppedAt: 0.5, quality: 480 });
            localStorage.setItem('v3_videos', JSON.stringify(myVideos));
            buildGrid();
            buildDashboard();
        }

        function buildDashboard() {
            const lst = document.getElementById('dashboard-list');
            if(!lst) return;
            lst.innerHTML = '';
            if(myVideos.length === 0) {
                lst.innerHTML = '<p class="text-center py-4" style="color: #6b7280;">فارغ</p>';
                return;
            }
            myVideos.forEach(v => {
                const li = document.createElement('div');
                li.className = "flex items-center gap-4 p-3 rounded-xl";
                li.style.cssText = "background: #111; border: 1px solid #1f2937;";
                
                let dUrl = v.url.length > 40 ? v.url.substring(0,40) + '...' : v.url;
                const thumb = generateImageUrl(v.url, v.stoppedAt || 0.5);

                li.innerHTML = `
                    <div class="rounded-lg overflow-hidden relative" style="width: 56px; height: 80px; background: #1f2937; flex-shrink: 0;">
                        <img src="${thumb}" class="absolute inset-0 w-full h-full object-cover" style="opacity: 0.7;" loading="lazy">
                    </div>
                    <div class="flex-grow overflow-hidden">
                        <p class="text-sm font-bold truncate" style="color: #e5e7eb;">${v.title || 'بدون'}</p>
                        <p class="text-xs truncate mt-1" style="color: #6b7280;" dir="ltr">${dUrl}</p>
                    </div>
                    <button type="button" onclick="dropVid('${v.id}')" class="btn-red px-4 py-2 text-sm rounded-lg font-bold">حذف</button>
                `;
                lst.appendChild(li);
            });
        }

        window.dropVid = function(id) {
            if(!confirm('حذف؟')) return;
            myVideos = myVideos.filter(v => v.id !== id);
            myDeleted.push(id);
            localStorage.setItem('v3_deleted', JSON.stringify(myDeleted));
            localStorage.setItem('v3_videos', JSON.stringify(myVideos));
            buildGrid();
            buildDashboard();
            displayAlert('تم الحذف', 'success');
        }

        let clkCt = 0; let clkTmr = null;
        document.getElementById('page-title').addEventListener('click', () => {
            clkCt++;
            if (clkCt === 3) { showLoginPanel(); clkCt = 0; }
            clearTimeout(clkTmr);
            clkTmr = setTimeout(() => { clkCt = 0; }, 1000);
        });

        document.getElementById('admin-password').addEventListener('keypress', e => {
            if (e.key === 'Enter') verifyAdmin();
        });

        bootApp();
    </script>
</body>
</html>
